  <text x="90" y="740" font-family="Inter, sans-serif" font-weight="800" font-size="92" fill="#14b8a6" letter-spacing="-2">become visible.</text>

  <text x="90" y="830" font-family="Inter, sans-serif" font-weight="400" font-size="30" fill="#ffffff" opacity="0.7">Every skill links to every project</text>
  <text x="90" y="875" font-family="Inter, sans-serif" font-weight="400" font-size="30" fill="#ffffff" opacity="0.7">it proves. Your story, mapped.</text>

