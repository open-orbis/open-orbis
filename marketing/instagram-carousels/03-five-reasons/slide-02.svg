<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" width="1080" height="1350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0418"/>
      <stop offset="100%" stop-color="#000"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="1350" fill="url(#bg)"/>

  <g transform="translate(540,80)">
    <circle cx="-60" r="5" fill="#a78bfa" opacity="0.3"/>
    <circle cx="-36" r="5" fill="#a78bfa"/>
    <circle cx="-12" r="5" fill="#a78bfa" opacity="0.3"/>
    <circle cx="12" r="5" fill="#a78bfa" opacity="0.3"/>
    <circle cx="36" r="5" fill="#a78bfa" opacity="0.3"/>
    <circle cx="60" r="5" fill="#a78bfa" opacity="0.3"/>
    <circle cx="84" r="5" fill="#a78bfa" opacity="0.3"/>
  </g>

  <text x="90" y="300" font-family="Inter, sans-serif" font-weight="900" font-size="280" fill="#7c3aed" opacity="0.35">01</text>

  <text x="90" y="520" font-family="Inter, sans-serif" font-weight="400" font-size="22" fill="#fbbf24" letter-spacing="5">REASON ONE</text>

  <text x="90" y="640" font-family="Inter, sans-serif" font-weight="800" font-size="92" fill="#ffffff" letter-spacing="-2">It's queryable</text>
  <text x="90" y="740" font-family="Inter, sans-serif" font-weight="800" font-size="92" fill="#a78bfa" letter-spacing="-2">by AI.</text>

  <text x="90" y="830" font-family="Inter, sans-serif" font-weight="400" font-size="30" fill="#ffffff" opacity="0.7">Claude, Cursor and Copilot connect</text>
  <text x="90" y="875" font-family="Inter, sans-serif" font-weight="400" font-size="30" fill="#ffffff" opacity="0.7">to your Orbis via MCP — natively.</text>

  <!-- mini demo card -->
  <g transform="translate(90,960)">
    <rect width="900" height="260" rx="20" fill="#1e1333" stroke="#7c3aed" stroke-width="2"/>
    <g font-family="Menlo, monospace" font-size="22">
      <text x="32" y="60" fill="#14b8a6">→ recruiter asks Claude:</text>
      <text x="32" y="110" fill="#ffffff" opacity="0.85">  "Has she shipped distributed systems?"</text>
      <text x="32" y="170" fill="#fbbf24">→ Claude queries orbis graph:</text>
      <text x="32" y="220" fill="#ffffff" opacity="0.85">  Yes. 3 projects, 5 years, 8 connections.</text>
    </g>
  </g>

  <text x="540" y="1290" text-anchor="middle" font-family="Inter, sans-serif" font-weight="500" font-size="22" fill="#ffffff" opacity="0.45">A PDF can't do that.</text>
</svg>
