<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" width="1080" height="1350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0418"/>
      <stop offset="100%" stop-color="#000"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="1350" fill="url(#bg)"/>

  <g transform="translate(540,80)">
    <circle cx="-60" r="5" fill="#a78bfa" opacity="0.3"/>
    <circle cx="-36" r="5" fill="#a78bfa" opacity="0.3"/>
    <circle cx="-12" r="5" fill="#a78bfa" opacity="0.3"/>
    <circle cx="12" r="5" fill="#a78bfa" opacity="0.3"/>
    <circle cx="36" r="5" fill="#a78bfa"/>
    <circle cx="60" r="5" fill="#a78bfa" opacity="0.3"/>
    <circle cx="84" r="5" fill="#a78bfa" opacity="0.3"/>
  </g>

  <text x="90" y="300" font-family="Inter, sans-serif" font-weight="900" font-size="280" fill="#ec4899" opacity="0.3">04</text>

  <text x="90" y="520" font-family="Inter, sans-serif" font-weight="400" font-size="22" fill="#fbbf24" letter-spacing="5">REASON FOUR</text>

  <text x="90" y="640" font-family="Inter, sans-serif" font-weight="800" font-size="92" fill="#ffffff" letter-spacing="-2">You control</text>
  <text x="90" y="740" font-family="Inter, sans-serif" font-weight="800" font-size="92" fill="#ec4899" letter-spacing="-2">who sees what.</text>

  <text x="90" y="830" font-family="Inter, sans-serif" font-weight="400" font-size="30" fill="#ffffff" opacity="0.7">Encrypted PII. Granular access.</text>
  <text x="90" y="875" font-family="Inter, sans-serif" font-weight="400" font-size="30" fill="#ffffff" opacity="0.7">Different views for different eyes.</text>

  <!-- two viewer cards -->
  <g transform="translate(90,960)" font-family="Inter, sans-serif">
    <g>
      <rect width="430" height="280" rx="20" fill="#1e1333" stroke="#a78bfa" stroke-width="2"/>
      <text x="32" y="60" font-weight="700" font-size="26" fill="#ffffff">Recruiter view</text>
      <text x="32" y="110" font-size="20" fill="#14b8a6">✓ Skills, roles, projects</text>
      <text x="32" y="150" font-size="20" fill="#14b8a6">✓ Public portfolio links</text>
      <text x="32" y="190" font-size="20" fill="#f97316">✗ Personal phone number</text>
      <text x="32" y="230" font-size="20" fill="#f97316">✗ Home address</text>
    </g>

    <g transform="translate(470,0)">
      <rect width="430" height="280" rx="20" fill="#1e1333" stroke="#fbbf24" stroke-width="2"/>
      <text x="32" y="60" font-weight="700" font-size="26" fill="#ffffff">Trusted friend view</text>
      <text x="32" y="110" font-size="20" fill="#14b8a6">✓ Everything above</text>
      <text x="32" y="150" font-size="20" fill="#14b8a6">✓ Contact details</text>
      <text x="32" y="190" font-size="20" fill="#14b8a6">✓ Draft ideas</text>
      <text x="32" y="230" font-size="20" fill="#14b8a6">✓ Private notes</text>
    </g>
  </g>

  <text x="540" y="1290" text-anchor="middle" font-family="Inter, sans-serif" font-weight="500" font-size="22" fill="#ffffff" opacity="0.45">Revoke any link, anytime.</text>
</svg>
