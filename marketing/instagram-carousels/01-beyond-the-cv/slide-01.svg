<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" width="1080" height="1350">
  <defs>
    <radialGradient id="bg1" cx="50%" cy="45%" r="65%">
      <stop offset="0%" stop-color="#1a0b3d"/>
      <stop offset="55%" stop-color="#0a0418"/>
      <stop offset="100%" stop-color="#000"/>
    </radialGradient>
    <radialGradient id="orb1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c4b5fd" stop-opacity="1"/>
      <stop offset="45%" stop-color="#7c3aed" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#4c1d95" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="txt1" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="1350" fill="url(#bg1)"/>

  <!-- star field -->
  <g fill="#ffffff" opacity="0.5">
    <circle cx="120" cy="180" r="1.2"/><circle cx="260" cy="90" r="1"/><circle cx="420" cy="220" r="1.4"/>
    <circle cx="640" cy="140" r="1"/><circle cx="820" cy="260" r="1.3"/><circle cx="960" cy="110" r="1"/>
    <circle cx="80" cy="380" r="1"/><circle cx="980" cy="440" r="1.2"/><circle cx="200" cy="500" r="1"/>
    <circle cx="880" cy="620" r="1.3"/><circle cx="60" cy="720" r="1.1"/><circle cx="1000" cy="820" r="1"/>
    <circle cx="150" cy="900" r="1.2"/><circle cx="920" cy="1020" r="1"/><circle cx="340" cy="1180" r="1.3"/>
    <circle cx="720" cy="1240" r="1"/><circle cx="520" cy="60" r="1"/><circle cx="480" cy="1280" r="1.2"/>
  </g>

  <!-- orb halo -->
  <circle cx="540" cy="560" r="360" fill="url(#orb1)" opacity="0.75"/>
  <circle cx="540" cy="560" r="90" fill="#ede9fe"/>
  <circle cx="540" cy="560" r="60" fill="#c4b5fd"/>

  <!-- rings -->
  <g fill="none" stroke-width="2" opacity="0.85">
    <ellipse cx="540" cy="560" rx="280" ry="90" stroke="#a78bfa" transform="rotate(-18 540 560)"/>
    <ellipse cx="540" cy="560" rx="260" ry="80" stroke="#8b5cf6" transform="rotate(22 540 560)"/>
    <ellipse cx="540" cy="560" rx="310" ry="100" stroke="#6366f1" transform="rotate(58 540 560)" opacity="0.6"/>
    <ellipse cx="540" cy="560" rx="240" ry="70" stroke="#c4b5fd" transform="rotate(-55 540 560)" opacity="0.7"/>
  </g>

  <!-- satellite nodes -->
  <circle cx="800" cy="530" r="8" fill="#fbbf24"/>
  <circle cx="260" cy="610" r="6" fill="#f59e0b"/>
  <circle cx="620" cy="320" r="7" fill="#f97316"/>
  <circle cx="460" cy="810" r="6" fill="#fbbf24"/>

  <!-- headline -->
  <text x="540" y="1070" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-weight="800" font-size="108" fill="url(#txt1)" letter-spacing="-3">Beyond</text>
  <text x="540" y="1190" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-weight="800" font-size="108" fill="#ffffff" letter-spacing="-3">the CV.</text>

  <text x="540" y="1270" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-weight="400" font-size="28" fill="#ffffff" opacity="0.55" letter-spacing="4">YOUR CAREER, REIMAGINED</text>

  <text x="540" y="100" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-weight="600" font-size="22" fill="#ffffff" opacity="0.5" letter-spacing="8">ORBIS</text>
</svg>
