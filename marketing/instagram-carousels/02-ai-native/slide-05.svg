<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" width="1080" height="1350">
  <defs>
    <linearGradient id="bg5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0b0716"/>
      <stop offset="100%" stop-color="#000"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="1350" fill="url(#bg5)"/>

  <g transform="translate(540,80)">
    <circle cx="-40" r="5" fill="#a78bfa" opacity="0.3"/>
    <circle cx="-20" r="5" fill="#a78bfa" opacity="0.3"/>
    <circle cx="0" r="5" fill="#a78bfa" opacity="0.3"/>
    <circle cx="20" r="5" fill="#a78bfa" opacity="0.3"/>
    <circle cx="40" r="5" fill="#a78bfa"/>
    <circle cx="60" r="5" fill="#a78bfa" opacity="0.3"/>
  </g>

  <!-- lock icon -->
  <g transform="translate(540,360)">
    <circle r="150" fill="#1e1333" stroke="#14b8a6" stroke-width="3"/>
    <g transform="translate(0,-6)" fill="none" stroke="#14b8a6" stroke-width="10" stroke-linecap="round">
      <path d="M -40 -30 v -20 a 40 40 0 0 1 80 0 v 20"/>
      <rect x="-54" y="-30" width="108" height="80" rx="10" fill="#14b8a6"/>
    </g>
    <circle cy="14" r="8" fill="#0b0716"/>
    <rect x="-3" y="14" width="6" height="22" fill="#0b0716"/>
  </g>

  <text x="540" y="620" text-anchor="middle" font-family="Inter, sans-serif" font-weight="400" font-size="24" fill="#14b8a6" letter-spacing="6">PRIVACY-FIRST</text>
  <text x="540" y="730" text-anchor="middle" font-family="Inter, sans-serif" font-weight="800" font-size="92" fill="#ffffff" letter-spacing="-2">Your rules.</text>
  <text x="540" y="820" text-anchor="middle" font-family="Inter, sans-serif" font-weight="800" font-size="92" fill="#14b8a6" letter-spacing="-2">Your graph.</text>

  <!-- feature bullets -->
  <g font-family="Inter, sans-serif">
    <g transform="translate(150,900)">
      <circle cx="20" cy="20" r="14" fill="#14b8a6"/>
      <path d="M 12 20 L 18 26 L 30 14" fill="none" stroke="#0b0716" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="60" y="28" font-size="26" font-weight="600" fill="#ffffff">Encrypted at rest</text>
      <text x="60" y="58" font-size="20" fill="#ffffff" opacity="0.55">Fernet encryption on every PII field.</text>
    </g>
    <g transform="translate(150,990)">
      <circle cx="20" cy="20" r="14" fill="#14b8a6"/>
      <path d="M 12 20 L 18 26 L 30 14" fill="none" stroke="#0b0716" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="60" y="28" font-size="26" font-weight="600" fill="#ffffff">Per-viewer filters</text>
      <text x="60" y="58" font-size="20" fill="#ffffff" opacity="0.55">Show recruiters one view; friends another.</text>
    </g>
    <g transform="translate(150,1080)">
      <circle cx="20" cy="20" r="14" fill="#14b8a6"/>
      <path d="M 12 20 L 18 26 L 30 14" fill="none" stroke="#0b0716" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="60" y="28" font-size="26" font-weight="600" fill="#ffffff">Revocable share tokens</text>
      <text x="60" y="58" font-size="20" fill="#ffffff" opacity="0.55">Turn off any link, any time.</text>
    </g>
    <g transform="translate(150,1170)">
      <circle cx="20" cy="20" r="14" fill="#14b8a6"/>
      <path d="M 12 20 L 18 26 L 30 14" fill="none" stroke="#0b0716" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="60" y="28" font-size="26" font-weight="600" fill="#ffffff">Export + delete, anytime</text>
      <text x="60" y="58" font-size="20" fill="#ffffff" opacity="0.55">GDPR by design. It's your data.</text>
    </g>
  </g>

  <text x="540" y="1310" text-anchor="middle" font-family="Inter, sans-serif" font-weight="600" font-size="22" fill="#ffffff" opacity="0.55">Open-source. Auditable. Self-hostable.</text>
</svg>
