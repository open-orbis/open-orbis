<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" width="1080" height="1350">
  <defs>
    <radialGradient id="bg6" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1e0a4a"/>
      <stop offset="60%" stop-color="#0b0716"/>
      <stop offset="100%" stop-color="#000"/>
    </radialGradient>
    <linearGradient id="cta6" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="1350" fill="url(#bg6)"/>

  <g transform="translate(540,80)">
    <circle cx="-40" r="5" fill="#a78bfa" opacity="0.3"/>
    <circle cx="-20" r="5" fill="#a78bfa" opacity="0.3"/>
    <circle cx="0" r="5" fill="#a78bfa" opacity="0.3"/>
    <circle cx="20" r="5" fill="#a78bfa" opacity="0.3"/>
    <circle cx="40" r="5" fill="#a78bfa" opacity="0.3"/>
    <circle cx="60" r="5" fill="#a78bfa"/>
  </g>

  <!-- orb -->
  <g transform="translate(540,420)">
    <circle r="160" fill="#7c3aed" opacity="0.45"/>
    <circle r="70" fill="#ede9fe"/>
    <circle r="40" fill="#a78bfa"/>
    <g fill="none" stroke-width="2.5">
      <ellipse rx="220" ry="64" stroke="#14b8a6" opacity="0.85" transform="rotate(-22)"/>
      <ellipse rx="200" ry="56" stroke="#fbbf24" opacity="0.9" transform="rotate(30)"/>
      <ellipse rx="240" ry="72" stroke="#a78bfa" opacity="0.5" transform="rotate(70)"/>
    </g>
    <circle cx="190" cy="-40" r="9" fill="#fbbf24"/>
    <circle cx="-170" cy="60" r="8" fill="#14b8a6"/>
    <circle cx="60" cy="200" r="7" fill="#ec4899"/>
  </g>

  <text x="540" y="740" text-anchor="middle" font-family="Inter, sans-serif" font-weight="800" font-size="90" fill="#ffffff" letter-spacing="-2">Give your career</text>
  <text x="540" y="840" text-anchor="middle" font-family="Inter, sans-serif" font-weight="800" font-size="90" fill="url(#cta6)" letter-spacing="-2">an API.</text>

  <text x="540" y="920" text-anchor="middle" font-family="Inter, sans-serif" font-weight="400" font-size="28" fill="#ffffff" opacity="0.6">Free during closed beta. Invite-only.</text>

  <!-- CTA button -->
  <g transform="translate(540,1050)">
    <rect x="-260" y="-46" width="520" height="92" rx="46" fill="url(#cta6)"/>
    <text x="0" y="14" text-anchor="middle" font-family="Inter, sans-serif" font-weight="700" font-size="32" fill="#0b0716">Request an invite  →</text>
  </g>

  <text x="540" y="1200" text-anchor="middle" font-family="Inter, sans-serif" font-weight="500" font-size="26" fill="#ffffff" opacity="0.7">openorbis.com</text>

  <text x="540" y="1280" text-anchor="middle" font-family="Inter, sans-serif" font-weight="400" font-size="18" fill="#ffffff" opacity="0.35" letter-spacing="3">#mcp  ·  #aiagents  ·  #knowledgegraph  ·  #claudecode</text>
</svg>
