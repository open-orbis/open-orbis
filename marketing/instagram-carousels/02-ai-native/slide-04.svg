<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" width="1080" height="1350">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0b0716"/>
      <stop offset="100%" stop-color="#000"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="1350" fill="url(#bg4)"/>

  <g transform="translate(540,80)">
    <circle cx="-40" r="5" fill="#a78bfa" opacity="0.3"/>
    <circle cx="-20" r="5" fill="#a78bfa" opacity="0.3"/>
    <circle cx="0" r="5" fill="#a78bfa" opacity="0.3"/>
    <circle cx="20" r="5" fill="#a78bfa"/>
    <circle cx="40" r="5" fill="#a78bfa" opacity="0.3"/>
    <circle cx="60" r="5" fill="#a78bfa" opacity="0.3"/>
  </g>

  <text x="540" y="210" text-anchor="middle" font-family="Inter, sans-serif" font-weight="800" font-size="92" fill="#ffffff" letter-spacing="-2">One link.</text>
  <text x="540" y="320" text-anchor="middle" font-family="Inter, sans-serif" font-weight="800" font-size="92" fill="#fbbf24" letter-spacing="-2">Everywhere.</text>

  <!-- QR illustration (stylized) -->
  <g transform="translate(340,430)">
    <rect width="400" height="400" rx="32" fill="#ffffff"/>
    <!-- blocks (simple ornamental QR-like pattern) -->
    <g fill="#000">
      <!-- corners -->
      <rect x="30" y="30" width="80" height="80"/>
      <rect x="46" y="46" width="48" height="48" fill="#ffffff"/>
      <rect x="60" y="60" width="20" height="20"/>

      <rect x="290" y="30" width="80" height="80"/>
      <rect x="306" y="46" width="48" height="48" fill="#ffffff"/>
      <rect x="320" y="60" width="20" height="20"/>

      <rect x="30" y="290" width="80" height="80"/>
      <rect x="46" y="306" width="48" height="48" fill="#ffffff"/>
      <rect x="60" y="320" width="20" height="20"/>

      <!-- data modules -->
      <rect x="140" y="40" width="16" height="16"/><rect x="170" y="40" width="16" height="16"/>
      <rect x="200" y="40" width="16" height="16"/><rect x="230" y="40" width="16" height="16"/>
      <rect x="140" y="70" width="16" height="16"/><rect x="230" y="70" width="16" height="16"/>
      <rect x="170" y="100" width="16" height="16"/><rect x="200" y="100" width="16" height="16"/>

      <rect x="40" y="140" width="16" height="16"/><rect x="70" y="140" width="16" height="16"/>
      <rect x="100" y="140" width="16" height="16"/><rect x="160" y="140" width="16" height="16"/>
      <rect x="220" y="140" width="16" height="16"/><rect x="280" y="140" width="16" height="16"/>
      <rect x="310" y="140" width="16" height="16"/><rect x="340" y="140" width="16" height="16"/>

      <rect x="40" y="170" width="16" height="16"/><rect x="100" y="170" width="16" height="16"/>
      <rect x="130" y="170" width="16" height="16"/><rect x="190" y="170" width="16" height="16"/>
      <rect x="250" y="170" width="16" height="16"/><rect x="310" y="170" width="16" height="16"/>

      <rect x="70" y="200" width="16" height="16"/><rect x="160" y="200" width="16" height="16"/>
      <rect x="220" y="200" width="16" height="16"/><rect x="280" y="200" width="16" height="16"/>
      <rect x="340" y="200" width="16" height="16"/>

      <rect x="40" y="230" width="16" height="16"/><rect x="130" y="230" width="16" height="16"/>
      <rect x="190" y="230" width="16" height="16"/><rect x="250" y="230" width="16" height="16"/>
      <rect x="310" y="230" width="16" height="16"/>

      <rect x="70" y="260" width="16" height="16"/><rect x="100" y="260" width="16" height="16"/>
      <rect x="160" y="260" width="16" height="16"/><rect x="220" y="260" width="16" height="16"/>
      <rect x="310" y="260" width="16" height="16"/><rect x="340" y="260" width="16" height="16"/>

      <rect x="160" y="300" width="16" height="16"/><rect x="190" y="300" width="16" height="16"/>
      <rect x="220" y="300" width="16" height="16"/><rect x="280" y="300" width="16" height="16"/>
      <rect x="340" y="300" width="16" height="16"/>

      <rect x="140" y="330" width="16" height="16"/><rect x="170" y="330" width="16" height="16"/>
      <rect x="210" y="330" width="16" height="16"/><rect x="250" y="330" width="16" height="16"/>
      <rect x="310" y="330" width="16" height="16"/>
    </g>

    <!-- center orb logo -->
    <circle cx="200" cy="200" r="44" fill="#ffffff"/>
    <circle cx="200" cy="200" r="32" fill="#7c3aed"/>
    <circle cx="200" cy="200" r="14" fill="#fbbf24"/>
  </g>

  <!-- URL bar -->
  <g transform="translate(180,890)">
    <rect width="720" height="90" rx="20" fill="#1e1333" stroke="#7c3aed" stroke-width="2"/>
    <circle cx="40" cy="45" r="6" fill="#14b8a6"/>
    <text x="66" y="58" font-family="Menlo, monospace" font-size="32" fill="#ffffff">openorbis.com/</text>
    <text x="394" y="58" font-family="Menlo, monospace" font-size="32" fill="#fbbf24">you</text>
  </g>

  <!-- use cases -->
  <g font-family="Inter, sans-serif" font-size="22" fill="#ffffff" opacity="0.7">
    <text x="540" y="1070" text-anchor="middle">Email signature · LinkedIn bio · Conference badge</text>
    <text x="540" y="1110" text-anchor="middle">Business card · Portfolio site · Recruiter DM</text>
  </g>

  <text x="540" y="1220" text-anchor="middle" font-family="Inter, sans-serif" font-weight="800" font-size="54" fill="#ffffff" letter-spacing="-1">Scan. See everything.</text>
  <text x="540" y="1285" text-anchor="middle" font-family="Inter, sans-serif" font-weight="400" font-size="22" fill="#ffffff" opacity="0.5">Always the latest version.</text>
</svg>
