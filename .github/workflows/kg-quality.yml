name: KG Quality Gate

on:
  pull_request:
    paths:
      - "backend/app/cv/**"
      - "backend/app/graph/queries.py"
      - "backend/tests/**"

concurrency:
  group: kg-quality-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  kg-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    # Security: only run for PRs from the same repo (not forks)
    if: github.event.pull_request.head.repo.full_name == github.repository

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Claude CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Restore Claude CLI credentials
        run: |
          mkdir -p ~/.claude
          echo '${{ secrets.CLAUDE_CREDENTIALS }}' > ~/.claude/.credentials.json
          chmod 600 ~/.claude/.credentials.json

      - name: Verify Claude CLI auth
        run: claude auth status
        working-directory: .

      - name: Install backend dependencies
        run: pip install -e ".[dev]" --quiet

      - name: Run KG quality integration test
        env:
          KG_TEST_MODEL: ${{ vars.KG_TEST_MODEL || 'claude-opus-4-6' }}
        run: |
          python -m pytest tests/integration/test_kg_quality.py \
            -v -s -m integration --tb=long 2>&1 | tee test_output.txt

      - name: Post results as PR comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let output = '';
            try {
              output = fs.readFileSync('backend/test_output.txt', 'utf8');
            } catch {
              output = 'No test output captured.';
            }
            const truncated = output.slice(-3000);
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## KG Quality Gate Results\n\n\`\`\`\n${truncated}\n\`\`\`\n\n_Model: \`${process.env.KG_TEST_MODEL || 'claude-opus-4-6'}\`_`
            });
