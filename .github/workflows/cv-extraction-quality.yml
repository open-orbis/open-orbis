name: CV Extraction Quality

on:
  pull_request:
    paths:
      - "backend/app/cv/**"
      - "backend/app/graph/queries.py"
      - "backend/tests/**"

concurrency:
  group: kg-quality-${{ github.head_ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  kg-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # Security: only run for PRs from the same repo (not forks)
    if: github.event.pull_request.head.repo.full_name == github.repository

    env:
      KG_TEST_MODEL: ${{ vars.KG_TEST_MODEL || 'claude-opus-4-6' }}

    steps:
      # ── common setup ────────────────────────────────────────────────
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"

      - name: Install Claude CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Check Claude CLI credentials
        id: claude-auth
        run: |
          if [ -z "${{ secrets.CLAUDE_CREDENTIALS }}" ]; then
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::CLAUDE_CREDENTIALS secret not set — skipping KG quality tests"
          else
            mkdir -p ~/.claude
            echo '${{ secrets.CLAUDE_CREDENTIALS }}' > ~/.claude/.credentials.json
            chmod 600 ~/.claude/.credentials.json
            echo "available=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify Claude CLI auth
        if: steps.claude-auth.outputs.available == 'true'
        run: claude auth status

      # ── phase 1: generate baseline from main ───────────────────────
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: main

      - name: Generate baselines from main branch
        if: steps.claude-auth.outputs.available == 'true'
        id: baseline
        timeout-minutes: 8
        working-directory: backend
        env:
          UV_PROJECT_ENVIRONMENT: /tmp/venv-main
        run: |
          if [ ! -f tests/integration/generate_baseline.py ]; then
            echo "generate_baseline.py not found on main (bootstrapping)"
            echo "available=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          uv sync --all-extras
          uv run python -m tests.integration.generate_baseline /tmp/kg_baselines
          echo "available=true" >> "$GITHUB_OUTPUT"

      # ── phase 2: test PR branch against baselines ──────────────────
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install backend dependencies (PR)
        if: steps.claude-auth.outputs.available == 'true'
        working-directory: backend
        run: uv sync --all-extras

      - name: Run KG quality integration test
        if: steps.claude-auth.outputs.available == 'true'
        timeout-minutes: 8
        working-directory: backend
        run: |
          set -o pipefail
          if [ "${{ steps.baseline.outputs.available }}" = "true" ]; then
            export KG_BASELINE_DIR=/tmp/kg_baselines
            # Reuse text extracted during baseline generation
            export KG_TEXT_CACHE_DIR=/tmp/kg_baselines/text_cache
            echo "Baseline: main branch extraction"
          else
            echo "Baseline: static golden references (first run — main lacks generate_baseline.py)"
          fi
          uv run python -m pytest tests/integration/test_kg_quality.py \
            -v -s -m integration --tb=long 2>&1 | tee test_output.txt
