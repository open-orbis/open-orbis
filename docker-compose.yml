services:
  neo4j:
    image: neo4j:5-community
    ports:
      - "7474:7474"  # Browser
      - "7687:7687"  # Bolt
    environment:
      NEO4J_AUTH: neo4j/orbis_dev_password
      NEO4J_PLUGINS: '[]'
    volumes:
      - neo4j_data:/data
      - ./infra/neo4j:/import

  ollama:
    image: ollama/ollama:latest
    container_name: orbis-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  whisper:
    image: onerahmet/openai-whisper-asr-webservice:latest
    container_name: orbis-whisper
    ports:
      - "9000:9000"
    environment:
      ASR_MODEL: base
      ASR_ENGINE: openai_whisper
    volumes:
      - whisper_data:/root/.cache/whisper

volumes:
  neo4j_data:
  ollama_data:
  whisper_data:
