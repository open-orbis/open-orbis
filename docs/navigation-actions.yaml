# ── Account Settings ──

- id: SETTINGS_CLAIM_ORB_ID
  from_state: ACCOUNT_SETTINGS
  action: Enter custom ID and click Save
  selector_or_control: "Orbis ID tab input + Save button"
  preconditions: [id_valid_format, id_not_taken]
  expected_effect: Claims the orbis ID for public URL
  next_state: ACCOUNT_SETTINGS (success)
  fallback_on_failure: Error "ID already taken" or validation error

- id: SETTINGS_SAVE_VERSION
  from_state: ACCOUNT_SETTINGS
  action: Click "Save current version" in Versions tab
  selector_or_control: "Save current version button"
  preconditions: [snapshots_count < 3 or will evict oldest]
  expected_effect: Creates orb snapshot in SQLite
  next_state: ACCOUNT_SETTINGS (version list updated)
  fallback_on_failure: Toast "Failed to save version"

- id: SETTINGS_RESTORE_VERSION
  from_state: ACCOUNT_SETTINGS
  action: Click Restore on a version then Confirm
  selector_or_control: "Restore button + confirmation modal"
  preconditions: [snapshot_exists]
  expected_effect: Saves current state, wipes graph, recreates from snapshot
  next_state: LANDING (page reload)
  fallback_on_failure: Toast "Failed to restore version"

- id: SETTINGS_DELETE_VERSION
  from_state: ACCOUNT_SETTINGS
  action: Click Delete on a version
  selector_or_control: "Delete button on version card"
  preconditions: [snapshot_exists]
  expected_effect: Removes snapshot from SQLite
  next_state: ACCOUNT_SETTINGS (version list updated)
  fallback_on_failure: Toast "Failed to delete version"

- id: SETTINGS_DELETE_ACCOUNT
  from_state: ACCOUNT_SETTINGS
  action: Click "Delete my account" then Confirm
  selector_or_control: "Account tab > Delete button + confirmation"
  preconditions: [authenticated, not_pending_deletion]
  expected_effect: Sets deletion_requested_at, clears local drafts, signs out
  next_state: LANDING
  fallback_on_failure: Error "Failed to delete account"

- id: SETTINGS_RECOVER_ACCOUNT
  from_state: ACCOUNT_SETTINGS
  action: Click "Recover my account"
  selector_or_control: "Account tab > Recover button (shown during grace period)"
  preconditions: [pending_deletion]
  expected_effect: Removes deletion_requested_at, restores account
  next_state: ORB_VIEW (page reload)
  fallback_on_failure: Error "Failed to recover account"

